version: '3.8'

networks:
  kong-net:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: vchatbot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vchatbot
    ports:
      - "5433:5432" # Your application's Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  qdrant:
    image: qdrant/qdrant
    container_name: vchatbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  kong-database:
    image: postgres:15
    container_name: kong-postgres
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    ports:
      - "5434:5432"
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    networks:
      - kong-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong/kong-gateway:3.10.0.2
    container_name: kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PASSWORD: test
    networks:
      - kong-net
    depends_on:
      kong-database:
        condition: service_healthy

  kong-gateway:
    image: kong/kong-gateway:3.10.0.2
    container_name: kong-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      # KONG_DECLARATIVE_CONFIG: /etc/kong/kong-dev.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_PASSWORD: test
    ports:
      - "8000:8000" # Kong Proxy HTTP
      - "8443:8443" # Kong Proxy HTTPS
      - "8001:8001" # Kong Admin API HTTP
      - "8444:8444" # Kong Admin API HTTPS
      - "8002:8002" # Kong Manager HTTP
      - "8445:8445" # Kong Manager HTTPS
    # volumes:
    #   - ./kong-dev.yml:/etc/kong/kong-dev.yml
    # command: gateway sync /config/kong-declarative-config.yml --kong-addr=http://api-gateway:8001
    networks:
      - kong-net
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
      kong-database:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-configurator:
    image: kong/deck:latest
    container_name: kong-configurator
    environment:
      KONG_PASSWORD: test
    depends_on:
      kong-gateway:
        condition: service_healthy
    volumes:
      - ./kong-dev.yml:/config/kong-dev.yml:ro
    command: gateway sync /config/kong-dev.yml --kong-addr=http://kong-gateway:8001
    networks:
      - kong-net
    restart: always


volumes:
  postgres_data:
  qdrant_data:
  kong_postgres_data: